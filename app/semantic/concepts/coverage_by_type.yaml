name: coverage_by_type
description: Policies that include a given coverage type (e.g. windshield).
params:
  - name: coverage_type
    required: true
    type: string
sql: |
  SELECT
    p.policy_id,
    cov.coverage_type,
    cov.limit_amount,
    cov.deductible,
    cov.coverage_id,
    c.full_name,
    c.customer_id,
    p.product_type,
    p.status
  FROM coverages cov
  JOIN policies p ON p.policy_id = cov.policy_id
  JOIN customers c ON c.customer_id = p.customer_id
  WHERE cov.coverage_type = %(coverage_type)s
  ORDER BY p.policy_id, cov.coverage_id
allowed_roles:
  - agent
  - adjuster
  - manager
response_fields:
  - policy_id
  - coverage_type
  - limit_amount
  - deductible
  - coverage_id
  - full_name
  - customer_id
  - product_type
  - status
result_mode: many
